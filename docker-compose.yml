services:
  mysql:
    image: mysql:8.4
    container_name: ownage-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ownage
      MYSQL_DATABASE: ownage
      MYSQL_USER: ownage
      MYSQL_PASSWORD: ownage
    ports:
      - "33066:3306"
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-pownage"]
      interval: 3s
      timeout: 3s
      retries: 20
    volumes:
      - ownage_mysql_data:/var/lib/mysql

volumes:
  ownage_mysql_data:
